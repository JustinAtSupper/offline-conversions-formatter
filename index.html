<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline Conversions Formatter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #d62027;
      min-height: 100vh;
      margin: 0;
      padding: 100px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 30px 20px;
      display: flex;
      justify-content: center;
      z-index: 100;
    }
    
    .header .logo {
      width: 120px;
    }
    
    .container {
      width: 100%;
      max-width: 550px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    
    h1 {
      color: #f9efd1;
      margin: 0 0 28px 0;
      font-weight: 500;
      font-size: 1.75rem;
    }
    
    .outer-card {
      width: 100%;
      background: rgba(249, 239, 209, 0.5);
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 8px 32px rgba(35, 31, 32, 0.15);
    }
    
    .drop-zone {
      width: 100%;
      height: 365px;
      border: none;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f9efd1;
      cursor: pointer;
      transition: all 0.2s ease;
      gap: 4px;
      position: relative;
    }
    
    .drop-zone-content.initial-state {
      transition: opacity 0.2s ease, transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    
    .drop-zone:hover .drop-zone-content.initial-state,
    .drop-zone.dragover .drop-zone-content.initial-state {
      transform: scale(1.06);
    }
    
    .drop-zone-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #231f20;
      font-size: 20px;
      letter-spacing: -0.3px;
      height: 24px;
      transition: opacity 0.2s ease;
    }
    
    .drop-zone-content.fade-out {
      opacity: 0;
    }
    
    .drop-zone-content svg {
      width: 22px;
      height: 22px;
      stroke: #231f20;
      stroke-width: 2;
      fill: none;
    }
    
    input[type="file"] {
      display: none;
    }
    
    .controls-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      width: 100%;
    }
    
    /* Preset dropdown */
    .preset-dropdown {
      flex: 1;
      position: relative;
    }
    
    .preset-dropdown.hidden {
      display: none;
    }
    
    .preset-toggle {
      width: 100%;
      height: 50px;
      padding: 0 18px;
      background: #231f20;
      color: #f9efd1;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 400;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }
    
    .preset-toggle:hover {
      background: #2d2a2b;
    }
    
    .preset-toggle svg {
      width: 16px;
      height: 16px;
      transition: transform 0.2s;
    }
    
    .preset-dropdown.open .preset-toggle svg {
      transform: rotate(180deg);
    }
    
    .preset-menu {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #231f20;
      border-radius: 0 0 10px 10px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
      z-index: 50;
    }
    
    .preset-dropdown.open .preset-menu {
      max-height: 200px;
    }
    
    .preset-dropdown.open .preset-toggle {
      border-radius: 10px 10px 0 0;
    }
    
    .preset-dropdown:not(.open) .preset-toggle {
      transition: border-radius 0.2s ease 0.2s, background 0.2s;
    }
    
    .preset-option {
      padding: 14px 18px;
      color: #f9efd1;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 15px;
      background: #231f20;
      text-align: left;
    }
    
    .preset-option:hover {
      background: #2d2a2b;
    }
    
    .preset-option.selected {
      background: #2d2a2b;
    }
    
    /* Download button */
    .download-btn {
      flex: 1;
      height: 50px;
      padding: 0 18px;
      background: #231f20;
      color: #f9efd1;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 400;
      cursor: pointer;
      display: none;
      transition: all 0.2s;
    }
    
    .download-btn:hover {
      background: #2d2a2b;
    }
    
    .download-btn.show {
      display: block;
    }
    
    /* Reset button */
    .reset-btn {
      width: 50px;
      height: 50px;
      padding: 0;
      background: #231f20;
      color: #f9efd1;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      display: none;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    
    .reset-btn:hover {
      background: #2d2a2b;
    }
    
    .reset-btn.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .reset-btn svg {
      width: 18px;
      height: 18px;
    }
    
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 30px 20px;
      text-align: center;
      color: #f9efd1;
      font-size: 12px;
    }

    .preset-badge {
      position: absolute;
      top: 14px;
      left: 14px;
      background: #231f20;
      color: #f9efd1;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .preset-badge.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <header class="header">
    <svg class="logo" viewBox="0 0 1276.98 187.91" xmlns="http://www.w3.org/2000/svg">
      <g fill="#f9efd1">
        <path d="M1261.25,4.35h-1.29v-1.24h4.05v1.24h-1.29v3.15h-1.47v-3.15Z"></path>
        <path d="M1264.35,3.11h1.53l.94,1.54.94-1.54h1.53v4.39h-1.46v-2.18l-1.01,1.56h-.03l-1.01-1.56v2.18h-1.44V3.11Z"></path>
        <path d="M386.67,53.43c-5.69-17.18-13.12-24.51-25.01-24.51s-18.82,7.58-18.82,19.96c0,27.54,76.26,29.56,76.26,86.67,0,31.33-21.04,52.05-56.95,52.05-27.73,0-49.27-15.41-58.43-51.29l33.67-7.33c3.96,21.98,16.34,29.82,26.49,29.82,11.88,0,21.04-8.09,21.04-21.73,0-34.36-76.26-34.87-76.26-85.91C308.68,19.82,327,.11,362.41.11c30.45,0,49.02,18.45,54.96,44.22l-30.7,9.1Z"></path>
        <path d="M517.15,2.64v127.6c0,17.43,7.43,26.53,24.02,26.53s24.26-9.1,24.26-26.53V2.64h34.17v127.85c0,40.17-23.27,57.1-58.43,57.1s-58.18-16.93-58.18-57.10V2.64h34.17Z"></path>
        <path d="M666.44,185.07V2.64h49.27c42.09,0,62.64,20.21,62.64,54.58s-20.55,54.58-62.64,54.58h-15.1v73.27h-34.17ZM700.61,82.99h18.32c16.84,0,25.25-8.59,25.25-25.77s-8.42-25.77-25.25-25.77h-18.32v51.54Z"></path>
        <path d="M836.28,185.07V2.64h49.27c42.09,0,62.64,20.21,62.64,54.58s-20.55,54.58-62.64,54.58h-15.1v73.27h-34.17ZM870.45,82.99h18.32c16.84,0,25.25-8.59,25.25-25.77s-8.42-25.77-25.25-25.77h-18.32v51.54Z"></path>
        <path d="M1004.14,185.07V2.64h93.59v30.83h-59.42v41.94h45.31v30.83h-45.31v48.01h61.9v30.83h-96.06Z"></path>
        <path d="M1240.34,185.07l-29.71-74.29h-16.34v74.29h-34.17V2.64h49.52c41.1,0,60.66,20.21,60.66,54.58,0,22.74-7.92,39.16-26.99,46.49l33.67,81.36h-36.64ZM1194.29,81.98h17.58c15.1,0,24.26-7.58,24.26-25.27s-9.16-25.27-24.26-25.27h-17.58v50.53Z"></path>
        <path d="M0,187.91v-62.57h93.96c1.8,45.02,68.07,38.83,62.51-5.81H0V0h250.55v62.47h-93.93c-1.8-45.02-68.07-38.83-62.51,5.81h156.44v119.63H0Z"></path>
      </g>
    </svg>
  </header>

  <div class="container">
    <h1>Offline Conversions Formatter</h1>
    
    <div class="outer-card">
      <div class="drop-zone" id="dropZone">
        <div class="preset-badge" id="presetBadge"></div>
        <div class="drop-zone-content initial-state" id="dropZoneContent">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          <span>Add files</span>
        </div>
      </div>
      
      <div class="controls-row">
        <div class="preset-dropdown" id="presetDropdown">
          <button class="preset-toggle" id="presetToggle">
            <span id="presetLabel">Presets</span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#f9efd1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>
          <div class="preset-menu" id="presetMenu">
            <div class="preset-option" data-value="bigshots">BigShots</div>
            <div class="preset-option" data-value="bigwhiskeys">Big Whiskey's</div>
          </div>
        </div>
        
        <button class="download-btn" id="downloadBtn">Download file</button>
        <button class="reset-btn" id="resetBtn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#f9efd1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
          </svg>
        </button>
      </div>
    </div>
    
    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" multiple>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const dropZoneContent = document.getElementById('dropZoneContent');
    const presetBadge = document.getElementById('presetBadge');
    const fileInput = document.getElementById('fileInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');
    const presetDropdown = document.getElementById('presetDropdown');
    const presetToggle = document.getElementById('presetToggle');
    const presetMenu = document.getElementById('presetMenu');
    const presetLabel = document.getElementById('presetLabel');
    
    let formattedCSV = null;
    let currentPreset = null;
    let pendingFiles = null;
    let currentState = 'initial'; // initial, file-detected, processed
    
    function setState(state, data = {}) {
      // SVG icons
      const fileIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>';
      const fileCheckIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><polyline points="9 15 11 17 15 13"/></svg>';
      const uploadIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>';
      const settingsIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>';
      const successIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      const errorIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      
      // Fade out, update content, fade in
      dropZoneContent.classList.add('fade-out');
      
      setTimeout(() => {
        currentState = state;
        
        if (state === 'initial') {
          dropZoneContent.innerHTML = uploadIcon + '<span>Add files</span>';
          dropZoneContent.classList.add('initial-state');
          presetLabel.textContent = 'Presets';
          presetDropdown.classList.remove('hidden');
          downloadBtn.classList.remove('show');
          resetBtn.classList.remove('show');
          formattedCSV = null;
          pendingFiles = null;
          currentPreset = null;
          fileInput.value = '';
          // Remove selected state from preset options
          presetMenu.querySelectorAll('.preset-option').forEach(opt => opt.classList.remove('selected'));
          presetBadge.classList.remove('show');
        } else if (state === 'file-only') {
          dropZoneContent.innerHTML = settingsIcon + '<span>Select a preset to begin</span>';
          dropZoneContent.classList.remove('initial-state');
          presetDropdown.classList.remove('hidden');
          downloadBtn.classList.remove('show');
          resetBtn.classList.remove('show');
        } else if (state === 'processed') {
          const count = data.recordCount || 0;
          const formattedCount = count.toLocaleString();
          dropZoneContent.innerHTML = successIcon + `<span>Processed ${formattedCount} records</span>`;
          dropZoneContent.classList.remove('initial-state');
          presetDropdown.classList.add('hidden');
          downloadBtn.classList.add('show');
          resetBtn.classList.add('show');
        }
        
        dropZoneContent.classList.remove('fade-out');
      }, 150);
    }
    
    // Custom dropdown logic
    presetToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpening = !presetDropdown.classList.contains('open');
      presetDropdown.classList.toggle('open');
      if (isOpening) {
        presetLabel.textContent = 'Presets';
      } else if (currentPreset) {
        // Restore selected name on close
        const selected = presetMenu.querySelector('.preset-option.selected');
        if (selected) presetLabel.textContent = selected.textContent;
      }
    });
    
    document.addEventListener('click', (e) => {
      if (!presetDropdown.contains(e.target)) {
        presetDropdown.classList.remove('open');
        // Restore selected name on close
        if (currentPreset) {
          const selected = presetMenu.querySelector('.preset-option.selected');
          if (selected) presetLabel.textContent = selected.textContent;
        }
      }
    });
    
    presetMenu.addEventListener('click', (e) => {
      const option = e.target.closest('.preset-option');
      if (option) {
        const value = option.dataset.value;
        currentPreset = value;
        presetLabel.textContent = option.textContent;
        
        // Update selected state
        presetMenu.querySelectorAll('.preset-option').forEach(opt => opt.classList.remove('selected'));
        option.classList.add('selected');
        
        // Show preset badge only if files have been added
        presetBadge.textContent = option.textContent + ' preset';
        if (pendingFiles) {
          presetBadge.classList.add('show');
        }
        
        presetDropdown.classList.remove('open');
        
        // If we have pending files, process them now
        if (pendingFiles) {
          processFiles(pendingFiles);
        }
      }
    });

    // Click to browse
    dropZone.addEventListener('click', () => {
      if (currentState !== 'processed') {
        fileInput.click();
      }
    });

    // Drag and drop handlers
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (currentState !== 'processed') {
        dropZone.classList.add('dragover');
      }
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (currentState === 'processed') return;
      
      const files = [...e.dataTransfer.files].filter(f =>
        f.name.match(/\.(csv|xlsx|xls)$/i)
      );
      if (files.length > 0) {
        handleFilesSelected(files);
      }
    });

    fileInput.addEventListener('change', (e) => {
      const files = [...e.target.files];
      if (files.length > 0) {
        handleFilesSelected(files);
      }
    });
    
    function handleFilesSelected(files) {
      pendingFiles = files;
      
      // Show badge if preset already selected
      if (currentPreset) {
        presetBadge.classList.add('show');
        processFiles(pendingFiles);
      } else {
        // No preset yet, show file-only state
        setState('file-only');
      }
    }

    function formatPhoneNumber(phone) {
      const digits = phone.replace(/\D/g, '');
      if (digits.length === 11 && digits.startsWith('1')) {
        return `1-(${digits.slice(1,4)})-${digits.slice(4,7)}-${digits.slice(7)}`;
      } else if (digits.length === 10) {
        return `1-(${digits.slice(0,3)})-${digits.slice(3,6)}-${digits.slice(6)}`;
      }
      return phone;
    }

    function splitName(fullName) {
      const parts = fullName.trim().split(' ');
      const firstName = parts[0] || '';
      const lastName = parts.slice(1).join(' ') || '';
      return { firstName, lastName };
    }

    function parseCSV(text) {
      const result = Papa.parse(text, {
        header: true,
        skipEmptyLines: true,
        dynamicTyping: false
      });
      return result.data;
    }

    function formatRevenue(value) {
      const num = parseFloat(value.replace(/[$,]/g, ''));
      if (isNaN(num)) return '$0.00';
      return '$' + num.toFixed(2);
    }

    function escapeCSVField(field) {
      if (field.includes(',') || field.includes('"') || field.includes('\n')) {
        return '"' + field.replace(/"/g, '""') + '"';
      }
      return field;
    }

    function getColumnValue(row, searchKey) {
      if (row[searchKey] !== undefined) return row[searchKey];
      const searchLower = searchKey.toLowerCase().trim();
      for (const key of Object.keys(row)) {
        if (key.toLowerCase().trim() === searchLower) {
          return row[key];
        }
      }
      return '';
    }

    // Read a single file and return rows as array of objects (header-keyed)
    async function readFile(file) {
      if (file.name.match(/\.(xlsx|xls)$/i)) {
        const ab = await file.arrayBuffer();
        const wb = XLSX.read(ab, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        return XLSX.utils.sheet_to_json(sheet, { defval: '' });
      } else {
        // CSV
        const text = await file.text();
        return parseCSV(text);
      }
    }

    async function processFiles(files) {
      try {
        // Read all files and combine raw data
        let allRawData = [];
        for (const file of files) {
          const rows = await readFile(file);
          allRawData = allRawData.concat(rows);
        }

        let outputHeaders, outputRows;
        
        if (currentPreset === 'bigshots') {
          outputHeaders = ['event_time', 'fn', 'ln', 'phone', 'email', 'value', 'currency', 'event_name'];
          outputRows = processBigShots(allRawData);
        } else if (currentPreset === 'bigwhiskeys') {
          outputHeaders = ['event_time', 'fn', 'ln', 'phone', 'email', 'value', 'currency', 'event_name'];
          outputRows = processBigWhiskeys(allRawData);
        } else {
          outputHeaders = ['event_time', 'fn', 'ln', 'phone', 'email', 'value', 'currency', 'event_name'];
          outputRows = processBigShots(allRawData);
        }
        
        formattedCSV = outputHeaders.join(',') + '\n';
        outputRows.forEach(row => {
          formattedCSV += row.map(escapeCSVField).join(',') + '\n';
        });
        
        setState('processed', { recordCount: outputRows.length });
        
      } catch (err) {
        const errorIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
        dropZoneContent.innerHTML = errorIcon + '<span>Error processing file</span>';
        console.error(err);
      }
    }
    
    function processBigShots(rawData) {
      const outputRows = [];
      
      rawData.forEach((row) => {
        const rawRevenue = getColumnValue(row, 'Onsite Gross (USD)');
        const revenueNum = parseFloat((rawRevenue || '0').replace(/[$,]/g, ''));
        
        if (isNaN(revenueNum) || revenueNum === 0) {
          return;
        }
        
        const { firstName, lastName } = splitName(getColumnValue(row, 'Full Name') || '');
        const phone = formatPhoneNumber(getColumnValue(row, 'Phone Number') || '');
        const revenue = formatRevenue(rawRevenue);
        
        outputRows.push([
          getColumnValue(row, 'Created Date') || '',
          firstName,
          lastName,
          phone,
          getColumnValue(row, 'Guest Email') || '',
          revenue,
          'USD',
          'Purchase'
        ]);
      });
      
      return outputRows;
    }

    function formatBWDate(val) {
      if (val == null || val === '') return '';
      let d;
      // SheetJS serial number (Excel date)
      if (typeof val === 'number') {
        d = new Date(Math.round((val - 25569) * 86400 * 1000));
      } else {
        d = new Date(String(val));
      }
      if (isNaN(d.getTime())) return String(val);
      const mo = d.getMonth() + 1;
      const day = d.getDate();
      const yr = d.getFullYear();
      const hr = String(d.getHours()).padStart(2, '0');
      const mn = String(d.getMinutes()).padStart(2, '0');
      return `${mo}/${day}/${yr} ${hr}:${mn}`;
    }

    function processBigWhiskeys(rawData) {
      const outputRows = [];

      rawData.forEach((row) => {
        // Time Placed
        const timePlaced = formatBWDate(getColumnValue(row, 'Time Placed') || '');

        // Customer Name -> split into first/last
        const fullName = getColumnValue(row, 'Customer Name') || '';
        const { firstName, lastName } = splitName(fullName);

        // Phone
        const phone = formatPhoneNumber(getColumnValue(row, 'Customer Phone') || '');

        // Email
        const email = getColumnValue(row, 'Customer Email') || '';

        // Subtotal
        const subtotal = getColumnValue(row, 'Subtotal') || '';

        outputRows.push([
          timePlaced,
          firstName,
          lastName,
          phone,
          email,
          String(subtotal),
          'USD',
          'Purchase'
        ]);
      });

      return outputRows;
    }

    // Reset button
    resetBtn.addEventListener('click', () => {
      setState('initial');
    });

    // Download button
    downloadBtn.addEventListener('click', async () => {
      if (!formattedCSV) return;
      
      try {
        if (window.showSaveFilePicker) {
          const handle = await window.showSaveFilePicker({
            suggestedName: 'formatted_data.csv',
            types: [{
              description: 'CSV Files',
              accept: { 'text/csv': ['.csv'] }
            }]
          });
          const writable = await handle.createWritable();
          await writable.write(formattedCSV);
          await writable.close();
        } else {
          const blob = new Blob([formattedCSV], { type: 'text/csv' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'formatted_data.csv';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }
      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error('Save failed:', err);
        }
      }
    });
  </script>
